services:
  rabbit-hole:
    build:
      context: .
      args:
        VITE_COMMIT_HASH: ${VITE_COMMIT_HASH:-dev}
    container_name: rabbit-hole
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      - rabbit-hole-data:/app/data
    restart: unless-stopped

volumes:
  rabbit-hole-data:
